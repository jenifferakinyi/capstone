<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Netlify Form</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; line-height: 1.6; }
    form { display: flex; flex-direction: column; gap: 15px; }
    input, textarea, button { padding: 10px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    button { background: #00ad9f; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #008c81; }
  </style>
</head>
<body>

  <h2>Share Your Truth</h2>
  
  <form name="truth-form" method="POST" data-netlify="true">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required placeholder="Your name">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required placeholder="Your email">

    <label for="truth">The Truth</label>
    <textarea id="truth" name="truth" rows="4" required placeholder="What is the truth you want to share?"></textarea>

    <button type="submit">Submit to Netlify</button>
  </form>

</body>
</html>
