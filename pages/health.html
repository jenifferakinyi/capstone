<!DOCTYPE html>
<html>
<head>
    <title>Poultry Health Agent</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

<nav>
    <div class="logo">Health Agent</div>
</nav>

<section class="stats">

<div class="card">
    <h2>Poultry Health Agent</h2>
    <p>Detects disease risks & vaccination gaps</p>
</div>

</section>

<section>

<h2 class="section-title">Health Assessment</h2>

<div class="card">

<input id="symptoms" placeholder="Enter symptoms (e.g cough, diarrhea)">
<input id="age" placeholder="Bird Age (weeks)">

<button onclick="checkHealth()">Analyze Health</button>

<h3 id="result"></h3>

</div>

</section>

<script>
function checkHealth() {

let symptoms = document.getElementById("symptoms").value.toLowerCase();
let age = document.getElementById("age").value;

let risk = "LOW";
let advice = "Birds are healthy";

if(symptoms.includes("cough") || symptoms.includes("diarrhea")){
    risk = "MEDIUM";
    advice = "Isolate birds and consult vet";
}

if(age > 20){
    risk = "HIGH";
    advice = "Vaccination review required";
}

document.getElementById("result").innerHTML =
`Risk Level: ${risk} <br> Recommendation: ${advice}`;
}
</script>

</body>
</html>
