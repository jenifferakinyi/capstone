<!DOCTYPE html>
<html>
<head>
    <title>Feed Optimization Agent</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

<nav>
    <div class="logo">Feed Agent</div>
</nav>

<section class="stats">

<div class="card">
    <h2>Feed Optimization Agent</h2>
    <p>Improves feed efficiency & reduces cost</p>
</div>

</section>

<section>

<h2 class="section-title">Feed Planner</h2>

<div class="card">

<input id="birdType" placeholder="Layer / Kienyeji">
<input id="age" placeholder="Bird Age (weeks)">
<input id="feedCost" placeholder="Weekly Feed Cost">

<button onclick="optimizeFeed()">Optimize Feed</button>

<h3 id="feedResult"></h3>

</div>

</section>

<script>
function optimizeFeed(){

let type = document.getElementById("birdType").value;
let age = document.getElementById("age").value;
let cost = document.getElementById("feedCost").value;

let plan = "";

if(age <= 8){
    plan = "Starter Feed (High Protein)";
}
else if(age <= 18){
    plan = "Grower Feed (Balanced Nutrition)";
}
else{
    plan = "Layer Feed (Calcium Rich)";
}

document.getElementById("feedResult").innerHTML =
`
Recommended Plan: ${plan} <br>
Estimated Efficiency Gain: 18%
`;
}
</script>

</body>
</html>
