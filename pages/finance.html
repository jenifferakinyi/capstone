<input id="income" placeholder="Income">

<input id="birds" placeholder="Bird Count">

<button onclick="checkLoan()">
Check Loan Readiness
</button>

<h2 id="result"></h2>

<script>

function checkLoan(){

let income =
document.getElementById("income").value;

let birds =
document.getElementById("birds").value;

let score=0;

if(income>30000)
score+=50;

if(birds>100)
score+=50;

document.getElementById("result")
.innerHTML=

`
Loan Readiness:
${score}%
`;

}

</script>
