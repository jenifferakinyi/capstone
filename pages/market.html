<!DOCTYPE html>
<html>
<head>
    <title>Market Intelligence Agent</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

<nav>
    <div class="logo">Market Agent</div>
</nav>

<section class="stats">

<div class="card">
    <h2>Market Intelligence Agent</h2>
    <p>Tracks egg & poultry prices across Kenya</p>
</div>

</section>

<section>

<h2 class="section-title">Market Prices</h2>

<div class="card">

<button onclick="getMarket()">Check Best Market</button>

<h3 id="marketResult"></h3>

</div>

</section>

<script>
function getMarket(){

const markets = [
    {name:"Nairobi", price:420},
    {name:"Kisumu", price:390},
    {name:"Mombasa", price:450}
];

let best = markets[0];

for(let m of markets){
    if(m.price > best.price){
        best = m;
    }
}

document.getElementById("marketResult").innerHTML =
`
Best Market: ${best.name} <br>
Egg Price: KES ${best.price} per tray <br>
Recommendation: Sell here for maximum profit
`;
}
</script>

</body>
</html>
